<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neo's Claw</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=M+PLUS+1+Code:wght@500&amp;display=swap" fetchPriority="high">
    <link rel="stylesheet"         href="https://fonts.googleapis.com/css2?family=M+PLUS+1+Code:wght@500&amp;display=swap" fetchPriority="high">
    <style>

:root {
  --bg      : #0a0a0f;
  --surface : #111118;
  --border  : #1e1e2e;
  --accent  : #7ee8a2;
  --accent2 : #38bdf8;
  --muted   : #3a3a52;
  --text    : #e2e2f0;
  --text-dim: #6b6b8a;
  --user-bg : #13131f;
  --agent-bg: #0e1a14;
  --radius  :  6px;
  --mono    : "M PLUS 1 Code", monospace;
  --sans    : "M PLUS 1 Code", monospace;
}

*, ::before, ::after { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  height: 100%;
  background: var(--bg);
  color: var(--text);
  font-family: var(--mono);
  font-size: 14px;
  line-height: 1.6;
  cursor: default;
}

/* Layout */
#app {
  display: grid;
  grid-template-rows: auto 1fr auto;
  height: 100vh;
  max-width: 860px;
  margin: 0 auto;
  padding: 0 16px;
}

/* Header */
header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 18px 0 14px;
  border-bottom: 1px solid var(--border);
}

.logo {
  font-family: var(--sans);
  font-weight: 800;
  font-size: 18px;
  letter-spacing: -0.02em;
  color: var(--accent);
}

.logo span { color: var(--text-dim); font-weight: 400; }

.status {
  display: flex;
  align-items: center;
  gap: 7px;
  font-size: 11px;
  color: var(--text-dim);
  font-weight: 300;
}

.status-dot {
  width: 7px; height: 7px;
  border-radius: 50%;
  background: var(--muted);
  transition: background 0.4s;
}
.status-dot.online { background: var(--accent); box-shadow: 0 0 6px var(--accent); }

#session-id {
  font-size: 10px;
  color: var(--muted);
  font-weight: 300;
}

/* Messages */
#messages {
  overflow-y: auto;
  padding: 24px 0 16px;
  display: flex;
  flex-direction: column;
  gap: 2px;
  scroll-behavior: smooth;
}

#messages::-webkit-scrollbar { width: 4px; }
#messages::-webkit-scrollbar-track { background: transparent; }
#messages::-webkit-scrollbar-thumb { background: var(--muted); border-radius: 2px; }

.message {
  display: grid;
  grid-template-columns: 52px 1fr;
  gap: 0 12px;
  padding: 10px 12px;
  border-radius: var(--radius);
  animation: fadeUp 0.18s ease both;
}
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(6px); }
  to   { opacity: 1; transform: translateY(0); }
}

.message.user   { background: var(--user-bg); }
.message.agent  { background: var(--agent-bg); border-left: 2px solid var(--accent); }
.message.system { background: transparent; opacity: 0.5; font-size: 11px; }

.message-role {
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  padding-top: 2px;
  text-align: right;
  color: var(--text-dim);
}

.message.user  .message-role { color: var(--accent2); }
.message.agent .message-role { color: var(--accent); }

.message-body {
  color: var(--text);
  white-space: pre-wrap;
  word-break: break-word;
}

.message-body code {
  background: var(--border);
  padding: 1px 5px;
  border-radius: 3px;
  font-size: 12px;
  font-family: var(--mono);
}

/* Tool Call Badge */
.tools-used {
  margin-top: 8px;
  display: flex;
  flex-wrap: wrap;
  gap: 5px;
}

.tool-badge {
  font-size: 10px;
  padding: 2px 8px;
  border-radius: 99px;
  background: var(--border);
  color: var(--text-dim);
  border: 1px solid var(--muted);
}

/* Typing Indicator */
.typing .message-body {
  display: flex;
  gap: 5px;
  align-items: center;
  height: 20px;
}

.typing .dot {
  width: 5px; height: 5px;
  border-radius: 50%;
  background: var(--accent);
  animation: blink 1.2s infinite;
}
.typing .dot:nth-child(2) { animation-delay: 0.2s; }
.typing .dot:nth-child(3) { animation-delay: 0.4s; }
@keyframes blink {
  0%, 80%, 100% { opacity: 0.2; transform: scale(0.8); }
  40%            { opacity: 1;   transform: scale(1); }
}

/* Input Area */
#input-area {
  padding: 12px 0 20px;
  border-top: 1px solid var(--border);
}

#input-wrap {
  display: flex;
  gap: 8px;
  align-items: flex-end;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 10px 12px;
  transition: border-color 0.2s;
}

#input-wrap:focus-within { border-color: var(--accent); }

#input {
  flex: 1;
  background: transparent;
  border: none;
  outline: none;
  color: var(--text);
  font-family: var(--mono);
  font-size: 14px;
  resize: none;
  min-height: 22px;
  max-height: 160px;
  line-height: 1.5;
}

#input::placeholder { color: var(--muted); }

#send-btn {
  background: var(--accent);
  border: none;
  border-radius: 4px;
  color: #0a0a0f;
  font-family: var(--mono);
  font-size: 12px;
  font-weight: 700;
  padding: 6px 14px;
  cursor: pointer;
  transition: opacity 0.15s, transform 0.1s;
  align-self: flex-end;
  letter-spacing: 0.04em;
}

#send-btn:hover  { opacity: 0.85; }
#send-btn:active { transform: scale(0.96); }
#send-btn:disabled { opacity: 0.3; cursor: not-allowed; }

.hint {
  font-size: 10px;
  color: var(--text-dim);
  margin-top: 7px;
  padding-left: 2px;
}

#reset-btn {
  background: none;
  border: none;
  color: var(--text-dim);
  font-family: var(--mono);
  font-size: 10px;
  cursor: pointer;
  padding: 0 4px;
  text-decoration: underline;
  text-underline-offset: 3px;
}
#reset-btn:hover { color: var(--text); }
    </style>
  </head>
  <body>

<div id="app">
  <header>
    <div>
      <div class="logo">Neo's Claw <span>/ Agent</span></div>
      <div id="session-id">Session : —</div>
    </div>
    <div style="display: flex; flex-direction: column; align-items: flex-end; gap: 5px;">
      <div class="status">
        <div class="status-dot" id="status-dot"></div>
        <span id="status-text">connecting...</span>
      </div>
      <div id="model-name" style="font-size: 10px; color: var(--muted);">model: —</div>
    </div>
  </header>
  
  <div id="messages"></div>
  
  <div id="input-area">
    <div id="input-wrap">
      <textarea id="input" rows="1" placeholder="メッセージを入力… (Ctrl+Enter で送信)" autocomplete="off"></textarea>
      <button id="send-btn" disabled>Send</button>
    </div>
    <div class="hint">
      Ctrl+Enter で送信&nbsp;・&nbsp;<button id="reset-btn">会話をリセット</button>
    </div>
  </div>
</div>

    <script>

(() => {
  // State
  const sessionId = 'web:' + Math.random().toString(36).slice(2, 10);
  let ws = null;
  let isWaiting = false;
  
  // DOM Refs
  const messagesEl = document.getElementById('messages');
  const inputEl    = document.getElementById('input');
  const sendBtn    = document.getElementById('send-btn');
  const statusDot  = document.getElementById('status-dot');
  const statusText = document.getElementById('status-text');
  const resetBtn   = document.getElementById('reset-btn');
  
  document.getElementById('session-id').textContent = 'session: ' + sessionId;
  
  // WebSocket
  function connect() {
    const proto = location.protocol === 'https:' ? 'wss' : 'ws';
    ws = new WebSocket(`${proto}://${location.host}`);
    
    ws.onopen = () => {
      statusDot.classList.add('online');
      statusText.textContent = 'online';
      sendBtn.disabled = false;
      
      appendMessage('system', 'エージェントに接続しました。');
    };
    
    ws.onclose = () => {
      statusDot.classList.remove('online');
      statusText.textContent = 'disconnected';
      sendBtn.disabled = true;
      // 3秒後に再接続する
      setTimeout(connect, 3000);
    };
    
    ws.onerror = () => ws.close();
    
    ws.onmessage = event => {
      const message = JSON.parse(event.data);
      
      if(message.type === 'chunk') {
        removeTyping();
        appendMessage('agent', message.text, []);
        isWaiting = false;
        sendBtn.disabled = false;
        inputEl.focus();
      }
      
      if(message.type === 'done') {
        // Tool Badges は Chunk と同時に受け取るので `done` では何もしない
        // (将来 Streaming 対応したら Chunk を細かく受け取る)
      }
      
      if(message.type === 'error') {
        removeTyping();
        appendMessage('agent', '⚠️ ' + message.message, []);
        isWaiting = false;
        sendBtn.disabled = false;
      }
    };
  }
  
  // Render
  const appendMessage = (role, text, toolCalls = []) => {
    const wrap = document.createElement('div');
    wrap.className = `message ${role}`;
    
    const roleLabel = { user: 'you', agent: 'agent', system: 'sys' }[role] ?? role;
    wrap.innerHTML = `
      <div class="message-role">${roleLabel}</div>
      <div class="message-body">${escapeHtml(text)}${toolCalls.length ? renderTools(toolCalls) : ''}</div>
    `;
    messagesEl.appendChild(wrap);
    scrollToBottom();
  };
  
  const appendTyping = () => {
    const wrap = document.createElement('div');
    wrap.className = 'message agent typing';
    wrap.id = 'typing-indicator';
    wrap.innerHTML = `
      <div class="message-role">agent</div>
      <div class="message-body">
        <span class="dot"></span><span class="dot"></span><span class="dot"></span>
      </div>
    `;
    messagesEl.appendChild(wrap);
    scrollToBottom();
  };
  
  const removeTyping = () => {
    document.getElementById('typing-indicator')?.remove();
  };
  
  const renderTools = toolCalls => {
    const badges = toolCalls.map(toolCall => `<span class="tool-badge">⚙ ${escapeHtml(toolCall.name)}</span>`).join('');
    return `<div class="tools-used">${badges}</div>`;
  };
  
  const escapeHtml = value => {
    return value.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  };
  
  const scrollToBottom = () => {
    messagesEl.scrollTop = messagesEl.scrollHeight;
  };
  
  // Send
  const sendMessage = () => {
    const text = inputEl.value.trim();
    if(text === '' || isWaiting || ws?.readyState !== WebSocket.OPEN) return;
    
    appendMessage('user', text);
    inputEl.value = '';
    autoResize();
    
    isWaiting = true;
    sendBtn.disabled = true;
    appendTyping();
    
    ws.send(JSON.stringify({ type: 'chat', message: text, sessionId }));
  };
  
  // Input Auto Resize
  const autoResize = () => {
    inputEl.style.height = 'auto';
    inputEl.style.height = Math.min(inputEl.scrollHeight, 160) + 'px';
  };
  
  inputEl.addEventListener('input', autoResize);
  
  inputEl.addEventListener('keydown', event => {
    if(event.key === 'Enter' && (event.ctrlKey || event.metaKey)) {
      event.preventDefault();
      sendMessage();
    }
  });
  
  sendBtn.addEventListener('click', sendMessage);
  
  // Reset
  resetBtn.addEventListener('click', async () => {
    await fetch(`/api/chat/${encodeURIComponent(sessionId)}`, { method: 'DELETE' });
    messagesEl.innerHTML = '';
    appendMessage('system', '会話履歴をリセットしました。');
  });
  
  // Init
  connect();
  appendMessage('system', 'エージェントに接続中...');
  inputEl.focus();
  
  // モデル名を取得して表示
  fetch('/api/health')
    .then(r => r.json())
    .then(data => {
      if (data.model != null) {
        document.getElementById('model-name').textContent = 'model: ' + data.model;
      }
    })
    .catch(() => {});
})();

    </script>
  </body>
</html>
